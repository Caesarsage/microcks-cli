name: dry-run-output-demo

# Demonstrates `microcks test --dry-run --output=github-actions`: it spins up an
# ephemeral Microcks (zero infra), contract-tests a local API, and surfaces the
# result as GitHub Actions annotations + a job step summary. Runs a conforming
# target (passes, ::notice::) and a drifted one (fails, ::error:: annotation).
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/dry-run-output-demo.yml'
      - 'cmd/**'
      - 'pkg/**'
      - 'go.*'

permissions:
  contents: read

jobs:
  contract-test:
    name: contract-test (${{ matrix.case }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        case: [conforming, drifted]
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ./go.mod
          cache-dependency-path: ./go.sum

      - name: Build microcks
        run: go build -o microcks .

      - name: Start the API under test on :3001
        env:
          # The drifted target returns price as a string, violating the
          # `price: {type: number}` schema, so the contract test fails.
          DRIFT: ${{ matrix.case == 'drifted' && '1' || '' }}
        run: |
          cat > stub.py <<'PY'
          import http.server, json, os
          price = "199.99" if os.environ.get("DRIFT") else 199.99
          BODY = json.dumps({"products":[{"id":"prod_001","name":"Widget","description":"d","price":price,"category":"Electronics","brand":"B","rating":4.5,"stockQuantity":150,"images":["https://example.com/a.jpg"],"specifications":{"x":"y"},"createdAt":"2024-01-15T10:30:00Z","updatedAt":"2024-01-20T14:45:00Z"}],"pagination":{"page":1,"limit":20,"total":1,"totalPages":1,"hasNext":False,"hasPrev":False}}).encode()
          class H(http.server.BaseHTTPRequestHandler):
              def do_GET(s):
                  s.send_response(200); s.send_header("Content-Type","application/json"); s.send_header("Content-Length",str(len(BODY))); s.end_headers(); s.wfile.write(BODY)
              def log_message(s,*a): pass
          http.server.HTTPServer(("0.0.0.0",3001),H).serve_forever()
          PY
          python3 stub.py &
          sleep 1

      - name: Contract test (dry-run, github-actions output)
        # continue-on-error so the drifted case still surfaces its annotations
        # without failing the whole workflow.
        continue-on-error: true
        run: |
          ./microcks test --dry-run --output=github-actions \
            --artifact samples/ecommerce-api-openapi.yml \
            --filteredOperations '["GET /products"]' \
            "E-Commerce Platform API:2.0.0" \
            http://localhost:3001 \
            OPEN_API_SCHEMA
